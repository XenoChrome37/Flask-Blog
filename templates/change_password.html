{% extends "base.html" %}

{% block title %}Change Password | Message Board{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    .input-group {
        position: relative;
        margin-bottom: 15px;
    }

    .input-group input {
        width: 100%;
        padding: 8px 35px 8px 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        box-sizing: border-box;
    }

    .input-group input:focus {
        border-color: #0067b8;
        outline: none;
    }

    .toggle-password {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        border: none;
        background: none;
        cursor: pointer;
        padding: 4px;
        color: #666;
    }

    .toggle-password:hover {
        color: #0067b8;
    }

    .toggle-password:focus {
        outline: none;
    }

    .toggle-password:focus-visible {
        outline: 2px solid #0067b8;
        border-radius: 4px;
    }

    /* Style for the back link */
    .back-link {
        display: inline-block;
        margin-top: 15px;
        color: #0067b8;
        text-decoration: none;
        font-size: 14px;
    }

    .back-link:hover {
        text-decoration: underline;
    }

    /* Optional: Add an icon to the back link */
    .back-link i {
        margin-right: 5px;
    }

    .error-message {
        color: red;
        font-size: 12px;
        margin-top: 5px;
        display: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <h2>Change Password</h2>
    <form method="POST" onsubmit="return validateForm()">
        <div class="input-group">
            <input type="password" id="old-password" name="old_password" placeholder="Current Password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('old-password', this)">
                <i class="fas fa-eye"></i>
            </button>
        </div>
        <div class="input-group">
            <input type="password" id="new-password" name="new_password" placeholder="New Password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('new-password', this)">
                <i class="fas fa-eye"></i>
            </button>
        </div>
        <div class="input-group">
            <input type="password" id="confirm-password" name="confirm_password" placeholder="Confirm New Password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('confirm-password', this)">
                <i class="fas fa-eye"></i>
            </button>
        </div>
        <button type="submit">Change Password</button>
    </form>
    <a href="{{ url_for('home') }}" class="back-link">
        👈 Back to Home
    </a>
</div>
{% endblock %}
