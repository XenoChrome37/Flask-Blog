{% extends "base.html" %}

{% block title %}Sign Up | Message Board{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    .input-group {
        position: relative;
        margin-bottom: 15px;
    }

    .input-group input {
        width: 100%;
        padding: 8px 35px 8px 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        box-sizing: border-box;
    }

    .input-group input:focus {
        border-color: #0067b8;
        outline: none;
    }

    .toggle-password {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        border: none;
        background: none;
        cursor: pointer;
        padding: 4px;
        color: #666;
    }

    .toggle-password:hover {
        color: #0067b8;
    }

    .toggle-password:focus {
        outline: none;
    }

    /* Optional: Add focus effect when clicking the eye icon */
    .toggle-password:focus-visible {
        outline: 2px solid #0067b8;
        border-radius: 4px;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <h2>Sign Up</h2>
    <form method="POST">
        <div class="input-group">
            <input type="text" id="username" name="username" placeholder="Username" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('password', this)">
                <i class="fas fa-eye"></i>
            </button>
        </div>
        <div class="input-group">
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm Password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('confirm-password', this)">
                <i class="fas fa-eye"></i>
            </button>
        </div>
        <button type="submit">Sign Up</button>
    </form>
</div>
{% endblock %}
